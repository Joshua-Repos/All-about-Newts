       <h1>All About Newts</h1>
       <p>A newt is a salamander in the subfamily Pleurodelinae.</p>
       <p>Newts are not poisonous to humans.</p>
       <p>The terrestrial juvenile phase is called an eft. </p>
       <p>Not all aquatic salamanders are considered newts, however.</p>
